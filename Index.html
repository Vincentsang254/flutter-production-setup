<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flutter Dev Cheatsheet</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 {
      color: #38bdf8;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .section {
      margin-top: 25px;
    }

    .section h2 {
      color: #facc15;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      position: relative;
    }

    .command {
      color: #22c55e;
      font-family: monospace;
      white-space: pre-wrap;
    }

    .desc {
      color: #94a3b8;
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #38bdf8;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .copy-btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>

  <h1>🚀 Flutter Dev Cheatsheet</h1>
  <input type="text" id="search" placeholder="Search commands..." />

  <div id="docs"></div>

  <script>
    const flutterDocs = [
      // ===== SETUP =====
      {
        category: "Setup",
        title: "Generate Keystore",
        command: "keytool -genkey -v -keystore upload-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload",
        desc: "Create a keystore for signing your app"
      },
      {
        category: "Setup",
        title: "Key Properties File",
        command: "android/key.properties",
        desc: "Store keystore credentials securely"
      },
      {
        category: "Setup",
        title: "Key Properties Example",
        command: `storePassword=your-password
keyPassword=your-password
keyAlias=upload
storeFile=upload-keystore.jks`,
        desc: "Used by Gradle for signing"
      },
      {
        category: "Setup",
        title: "Configure Signing (build.gradle)",
        command: `android {
  signingConfigs {
    release {
      keyAlias keystoreProperties['keyAlias']
      keyPassword keystoreProperties['keyPassword']
      storeFile file(keystoreProperties['storeFile'])
      storePassword keystoreProperties['storePassword']
    }
  }
  buildTypes {
    release {
      signingConfig signingConfigs.release
      minifyEnabled true
      shrinkResources true
    }
  }
}`,
        desc: "Enable release signing"
      },

      // ===== BUILD =====
      {
        category: "Build",
        title: "Build APK",
        command: "flutter build apk --release",
        desc: "Build signed APK"
      },
      {
        category: "Build",
        title: "Build App Bundle",
        command: "flutter build appbundle",
        desc: "Recommended for Play Store"
      },
      {
        category: "Build",
        title: "Clean Project",
        command: "flutter clean",
        desc: "Clear build cache"
      },
      {
        category: "Build",
        title: "Get Packages",
        command: "flutter pub get",
        desc: "Install dependencies"
      },

      // ===== TOOLS =====
      {
        category: "Tools",
        title: "Rename App",
        command: "flutter pub run rename",
        desc: "Rename package & app name"
      },
      {
        category: "Tools",
        title: "Generate Splash Screen",
        command: "flutter pub run flutter_native_splash:create",
        desc: "Auto generate splash screen"
      },
      {
        category: "Tools",
        title: "Generate App Icons",
        command: "flutter pub run flutter_launcher_icons",
        desc: "Generate app icons"
      },
      {
        category: "Tools",
        title: "Doctor Check",
        command: "flutter doctor",
        desc: "Check environment"
      },
      {
        category: "Tools",
        title: "Devices",
        command: "flutter devices",
        desc: "List devices"
      },
      {
        category: "Tools",
        title: "Run App",
        command: "flutter run",
        desc: "Run on device"
      }
    ];

    const docsContainer = document.getElementById("docs");
    const searchInput = document.getElementById("search");

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text);
      alert("Copied!");
    }

    function renderDocs(filter = "") {
      docsContainer.innerHTML = "";

      const grouped = {};

      flutterDocs.forEach(doc => {
        if (
          doc.title.toLowerCase().includes(filter.toLowerCase()) ||
          doc.command.toLowerCase().includes(filter.toLowerCase())
        ) {
          if (!grouped[doc.category]) grouped[doc.category] = [];
          grouped[doc.category].push(doc);
        }
      });

      for (let category in grouped) {
        const section = document.createElement("div");
        section.className = "section";

        section.innerHTML = `<h2>${category}</h2>`;

        grouped[category].forEach(doc => {
          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <button class="copy-btn">Copy</button>
            <h3>${doc.title}</h3>
            <p class="command">${doc.command}</p>
            <p class="desc">${doc.desc}</p>
          `;

          div.querySelector(".copy-btn").onclick = () =>
            copyToClipboard(doc.command);

          section.appendChild(div);
        });

        docsContainer.appendChild(section);
      }
    }

    searchInput.addEventListener("input", (e) => {
      renderDocs(e.target.value);
    });

    renderDocs();
  </script>

</body>
</html>
